name: Release
on:
  push:
    tags: ['v*']
jobs:
  release:
    uses: JDE-Projects/Build-Tools/.github/workflows/release.yml@50c6357e33a5c715e4f55df9e366c9600cca0943 # Build-Tools main (CI checks: ruff, import, pytest)
    permissions:
      id-token: write
      attestations: write
      contents: write
    with:
      app_name: SimpleSFTPServer
      dist_subfolder: "Simple SFTP Server"
      python_version: "3.14"
      build_command: "Build_Simple_SFTP_Server.bat"
      app_id: "1d184cf8-3eba-4348-869d-f299485d38f6"
      entry_script: "simple_sftp_server.py"
